services:
  # API Backend
  - type: web
    name: solimouv-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: solimouv-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://solimouv.onrender.com

  # Frontend Svelte (si déploiement séparé)
  - type: static
    name: solimouv-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://solimouv-backend.onrender.com/api

databases:
  # Base de données PostgreSQL
  - name: solimouv-db
    databaseName: solimouv
    plan: starter
